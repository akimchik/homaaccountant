{% extends 'expenses/base.html' %}

{% block content %}
    <h1>Categories</h1>
    <a href="{% url 'category-create' %}" class="btn btn-primary mb-3">New Category</a>
    <ul class="list-group">
        {% for category in categories %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ category.name }}
                <div>
                    <a href="{% url 'category-update' category.pk %}" class="btn btn-secondary btn-sm">Edit</a>
                    <a href="{% url 'category-delete' category.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </li>
        {% empty %}
            <li class="list-group-item">No categories found.</li>
        {% endfor %}
    </ul>
{% endblock %}
