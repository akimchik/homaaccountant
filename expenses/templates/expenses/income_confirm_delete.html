{% extends 'expenses/base.html' %}

{% block content %}
    <h1>Delete Income</h1>
    <p>Are you sure you want to delete the income "{{ object.description }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'income-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
