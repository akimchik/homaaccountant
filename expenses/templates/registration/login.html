{% extends 'expenses/base.html' %}

{% block content %}
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  {# Link to the signup page for users who don't have an account. #}
  <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up here</a>.</p>
{% endblock %}
